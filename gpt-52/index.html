<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Tetris</title>
    <style>
      :root {
        --bg0: #07040d;
        --bg1: #120a24;
        --neon: #79ffd7;
        --hot: #ff4fd8;
        --amber: #ffbf4d;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(1200px 600px at 50% 20%, #24124a 0%, var(--bg1) 45%, var(--bg0) 100%);
        overflow: hidden;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      #app {
        height: 100%;
      }

      canvas {
        display: block;
        margin: 0 auto;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
